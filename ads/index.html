<html>
  <head>
    <meta charset="utf-8">
    <title>Control SRA batching example</title>
    <script async src="https://securepubads.g.doubleclick.net/tag/js/gpt.js"></script>
    <script>
      window.googletag = window.googletag || {cmd: []};
      var anchorSlot;
      googletag.cmd.push(function() {
        // Define ad slots.
        let adElements = document.querySelectorAll('.ad-slot');
        let network = "/5445743/AWS-Universal" //declared network variable
        let slots = Array.from(adElements).map((element, i) => 
          googletag.defineSlot(network, [300, 250], element.id)
            .setTargeting('postID', '1')  // assuming static values
            .setTargeting('category', 'blog') // assuming static values
            .setTargeting('position', 'SeparatorAd')
            .setTargeting('section',i)
            .addService(googletag.pubads())
        );

        anchorSlot = googletag.defineOutOfPageSlot(
            network, googletag.enums.OutOfPageFormat.BOTTOM_ANCHOR);

        if (anchorSlot) {
          anchorSlot
              .setTargeting('test', 'anchor')
              .addService(googletag.pubads());
        }

        // Disable initial load to precisely control when ads are requested.
        googletag.pubads().disableInitialLoad();

        // Enable SRA and services.
        googletag.pubads().enableSingleRequest();
        googletag.enableServices();

        // Issue first SRA request (slots 1 and 2) immediately.
        googletag.pubads().refresh(slots);
        
        // This is the right place to display anchorSlot
        if (anchorSlot) {
            googletag.display(anchorSlot.getSlotElementId());
        }
      });
    </script>
    <style>
      .ad-slot {
        border-style: solid;
        display: block;
        margin: 1px;
      }

      .row {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
      }
    </style>
  </head>
  <body>
    <div id="static-ad-1" style="width: 100px; height: 100px;"></div>

    <div class="row">
      <p>SRA request #1</p>
    </div>

    <div class="row">
      <div id="slot-1" class="ad-slot" ></div>
      <div id="slot-2" class="ad-slot" ></div>
    </div>

     <div class="row">
       <p>SRA request #2 in <span id="seconds">5</span> seconds...</p>
     </div>

    <div class="row">
      <div id="slot-3" class="ad-slot" ></div>
      <div id="slot-4" class="ad-slot" ></div>
      <div id="slot-5" class="ad-slot" ></div>
    </div>
    <script>
      googletag.cmd.push(function() {
        // Ensure the first call to display comes after static ad slot
        // divs are defined. If you do not have any static ad slots, this
        // call can be made immediately after services are enabled.
        googletag.display(anchorSlot);
      });
    </script>
  </body>
</html>
