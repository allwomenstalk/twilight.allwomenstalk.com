<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Email Signature</title>
  </head>
  <body style="font-family: Arial, sans-serif; color: #222222;">
    <div style="max-width: 720px; margin: 24px auto; padding: 0 12px;">
      <h1 style="font-size: 18px; margin: 0 0 12px;">Email Signature</h1>
      <p style="margin: 0 0 16px; color: #666666;">
        Edit the fields below. Then copy everything inside the signature box into Gmail.
      </p>

      <div style="border: 1px solid #e6e6e6; padding: 12px; border-radius: 8px; margin-bottom: 16px;">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
          <label style="display: block; font-size: 12px; color: #666666;">
            Name
            <input id="sig-name" type="text" value="Your Name" style="width: 100%; padding: 8px; margin-top: 4px;" />
          </label>
          <label style="display: block; font-size: 12px; color: #666666;">
            Title
            <input id="sig-title" type="text" value="Your Title" style="width: 100%; padding: 8px; margin-top: 4px;" />
          </label>
          <label style="display: block; font-size: 12px; color: #666666;">
            Email
            <input id="sig-email" type="email" value="you@allwomenstalk.com" style="width: 100%; padding: 8px; margin-top: 4px;" />
          </label>
          <label style="display: block; font-size: 12px; color: #666666;">
            Website
            <input id="sig-website" type="url" value="https://allwomenstalk.com" style="width: 100%; padding: 8px; margin-top: 4px;" />
          </label>
          <label style="display: block; font-size: 12px; color: #666666;">
            Logo URL
            <input id="sig-logo" type="url" value="https://allwomenstalk.com/images/appicon.png" style="width: 100%; padding: 8px; margin-top: 4px;" />
          </label>
          <label style="display: block; font-size: 12px; color: #666666;">
            Brand Color
            <input id="sig-brand" type="text" value="#e06c5b" style="width: 100%; padding: 8px; margin-top: 4px;" />
          </label>
        </div>
      </div>

      <!-- Copy everything inside the signature wrapper into Gmail -->
      <div id="signature-wrapper" style="border: 1px dashed #cccccc; padding: 12px;">
        <table
          class="signature"
          cellpadding="0"
          cellspacing="0"
          border="0"
          style="font-family: Arial, sans-serif; color: #222222;"
        >
          <tr>
            <td style="padding-right: 14px; border-right: 2px solid #f0c4b4;">
              <a href="https://allwomenstalk.com" target="_blank" style="text-decoration: none;">
                <img
                  src="https://allwomenstalk.com/images/appicon.png"
                  alt="Allwomenstalk"
                  width="120"
                  style="display: block; border: 0; outline: none; height: auto;"
                />
              </a>
            </td>
            <td style="padding-left: 14px;">
              <div style="font-size: 16px; font-weight: 700; line-height: 1.2; color: #222222;">Your Name</div>
              <div style="font-size: 13px; color: #666666; line-height: 1.4;">Your Title</div>
              <div style="font-size: 13px; line-height: 1.6; margin-top: 6px;">
                <span style="color: #999999;">Email:</span>
                <a href="mailto:you@allwomenstalk.com" style="color: #222222; text-decoration: none;">you@allwomenstalk.com</a>
              </div>
              <div style="font-size: 13px; line-height: 1.6;">
                <a href="https://allwomenstalk.com" target="_blank" style="color: #e06c5b; text-decoration: none; font-weight: 600;">allwomenstalk.com</a>
              </div>
            </td>
          </tr>
        </table>
      </div>
    </div>

    <script>
      (function () {
        const fields = {
          name: document.getElementById("sig-name"),
          title: document.getElementById("sig-title"),
          email: document.getElementById("sig-email"),
          website: document.getElementById("sig-website"),
          logo: document.getElementById("sig-logo"),
          brand: document.getElementById("sig-brand"),
        };

        const wrapper = document.getElementById("signature-wrapper");

        function textOrEmpty(value) {
          return (value || "").trim();
        }

        function renderSignature() {
          const name = textOrEmpty(fields.name.value);
          const title = textOrEmpty(fields.title.value);
          const email = textOrEmpty(fields.email.value);
          const website = textOrEmpty(fields.website.value);
          const logo = textOrEmpty(fields.logo.value);
          const brand = textOrEmpty(fields.brand.value) || "#e06c5b";

          const websiteLabel = website.replace(/^https?:\/\//, "");
          const hasLogo = Boolean(logo);

          const leftCell = hasLogo
            ? `<td style="padding-right: 14px; border-right: 2px solid #f0c4b4;">
                <a href="${website || "#"}" target="_blank" style="text-decoration: none;">
                  <img src="${logo}" alt="Allwomenstalk" width="120" style="display: block; border: 0; outline: none; height: auto;" />
                </a>
              </td>`
            : "";

          const nameLine = name
            ? `<div style="font-size: 16px; font-weight: 700; line-height: 1.2; color: #222222;">${name}</div>`
            : "";
          const titleLine = title
            ? `<div style="font-size: 13px; color: #666666; line-height: 1.4;">${title}</div>`
            : "";
          const emailLine = email
            ? `<div style="font-size: 13px; line-height: 1.6; margin-top: 6px;"><span style="color: #999999;">Email:</span> <a href="mailto:${email}" style="color: #222222; text-decoration: none;">${email}</a></div>`
            : "";
          const websiteLine = website
            ? `<div style="font-size: 13px; line-height: 1.6;"><a href="${website}" target="_blank" style="color: ${brand}; text-decoration: none; font-weight: 600;">${websiteLabel}</a></div>`
            : "";

          wrapper.innerHTML = `
            <table cellpadding="0" cellspacing="0" border="0" style="font-family: Arial, sans-serif; color: #222222;">
              <tr>
                ${leftCell}
                <td style="${hasLogo ? "padding-left: 14px;" : ""}">
                  ${nameLine}
                  ${titleLine}
                  ${emailLine}
                  ${websiteLine}
                </td>
              </tr>
            </table>
          `;
        }

        Object.values(fields).forEach((input) => {
          input.addEventListener("input", renderSignature);
        });

        renderSignature();
      })();
    </script>
  </body>
</html>
