version: 0.2

env:
  variables:
    # Keep npm install behavior deterministic and lighter.
    NPM_CONFIG_AUDIT: "false"
    NPM_CONFIG_FUND: "false"

phases:
  install:
    commands:
      - npm ci --no-audit --no-fund

  pre_build:
    commands:
      - |
        MEM_TOTAL_MB=$(awk '/MemTotal/ {print int($2/1024)}' /proc/meminfo)
        HEAP_MB=$((MEM_TOTAL_MB * 65 / 100))
        if [ "$HEAP_MB" -lt 1024 ]; then HEAP_MB=1024; fi
        if [ "$HEAP_MB" -gt 6144 ]; then HEAP_MB=6144; fi
        export NODE_OPTIONS="--max-old-space-size=${HEAP_MB}"
        echo "MemTotal=${MEM_TOTAL_MB}MB, NODE_OPTIONS=${NODE_OPTIONS}"
      - export PROFILE_LIMIT="${PROFILE_LIMIT:-300}"
      - export PROFILE_POST_LIMIT="${PROFILE_POST_LIMIT:-12}"

  build:
    commands:
      - echo "[]" > src/_data/posts.json
      - node getpopular.js
      - node getpolls.js
      - node getarchives.js
      - node getadsense.js
      - node getprofiles.js
      - node getmix.js
      - ls -lah src/_data/
      - rm -f src/index.njk
      - npm run build
      - sh archiveupload.sh
      - aws s3 cp _site/allwomenstalk.com/profile/ s3://allwomenstalk.com/profile/ --recursive
